{% load static i18n %}
{% comment %}
    BLOC IMAGE — skin classic. Image seule, centree (ex. image-titre de section).
    / IMAGE block — classic skin. Standalone centered image (e.g. section title image).
{% endcomment %}
<section class="tb-bloc tb-bloc--image" data-testid="bloc-image">
    {% if bloc.image %}
        <img class="tb-bloc__image-seule"
             src="{{ bloc.image.fhd.url }}"
             alt="{{ bloc.titre }}" loading="lazy">
    {% endif %}
</section>
