{% load static i18n %}
{% comment %}
    BLOC NEWSLETTER — skin classic. Formulaire d'inscription Ghost.
    Le script est VENDORISÉ (pages/static/pages/vendor/ghost/, zéro CDN, comme Leaflet).
    Il lit ses attributs data-* et injecte lui-même un <iframe> vers l'instance Ghost
    (data-site = bloc.embed_url). Aucune whitelist : le script est local, il ne fait que
    poster vers l'instance Ghost configurée (périmètre du gestionnaire). Les couleurs par
    défaut sont l'identité TiBillet (surchargeables plus tard si un tenant le demande).
    Django échappe automatiquement les data-* (pas d'injection d'attribut).
    / NEWSLETTER block — Ghost signup form. Vendored script (zero CDN). It reads its
    data-* attributes and injects an <iframe> to the Ghost instance (data-site).
    No whitelist: the script is local and only posts to the configured Ghost instance.
{% endcomment %}
{% if bloc.embed_url %}
    <section class="tb-bloc tb-bloc--newsletter" data-testid="bloc-newsletter">
        <div class="tb-bloc__contenu">
            <div class="tb-newsletter">
                <script src="{% static 'pages/vendor/ghost/signup-form.min.js' %}"
                        data-site="{{ bloc.embed_url }}"
                        data-title="{{ bloc.titre }}"
                        data-description="{{ bloc.sous_titre }}"
                        data-locale="fr"
                        data-background-color="#08090c"
                        data-text-color="#FFFFFF"
                        data-button-color="#e93363"
                        data-button-text-color="#FFFFFF"
                        async></script>
            </div>
        </div>
    </section>
{% endif %}
