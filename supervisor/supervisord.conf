; Supervisord — orchestre les 3 processus du conteneur Lespass en production :
; gunicorn (HTTP), daphne (WebSockets), celery (tâches + beat).
; Lancé par start.sh. Le conteneur tourne en user tibillet (non-root),
; supervisord hérite de cet utilisateur — pas de directive user= nécessaire.
; / Supervisord — orchestrates the 3 processes of the Lespass production
; container: gunicorn (HTTP), daphne (WebSockets), celery (tasks + beat).
; Started by start.sh. The container runs as the tibillet user (non-root).
[supervisord]
nodaemon=true
logfile=/DjangoFiles/logs/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/DjangoFiles/logs/supervisor/supervisord.pid

[include]
files = /DjangoFiles/supervisor/conf.d/*.conf

[supervisorctl]
serverurl=unix:///DjangoFiles/logs/supervisor/supervisor.sock

[unix_http_server]
file=/DjangoFiles/logs/supervisor/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
