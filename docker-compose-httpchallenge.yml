####
# DEV ENV HTTPS - Domaine avec Let's Encrypt
####

services:
  #########
  # TRAEFIK PROXY avec Let's Encrypt
  #########
  traefik:
    image: "traefik:latest"
    container_name: "traefik"
    hostname: "traefik"
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.network=frontend"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.entrypoints-https.address=:443"
      - "--entrypoints.entrypoints-http.address=:80"
      - "--entrypoints.entrypoints-http.http.redirections.entryPoint.to=entrypoints-https"
      - "--entrypoints.entrypoints-http.http.redirections.entryPoint.scheme=https"
      # Configuration Let's Encrypt (HTTP-01 challenge)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=entrypoints-http"
      - "--certificatesresolvers.letsencrypt.acme.email=myemail@test.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    restart: unless-stopped
    networks:
      - frontend

  #### FEDOW ####
  fedow_memcached:
    image: memcached:1.6
    container_name: fedow_memcached
    hostname: fedow_memcached
    restart: always
    networks:
      - backend

  fedow_django:
    image: tibillet/fedow:latest
    container_name: fedow_django
    hostname: fedow_django
    restart: unless-stopped
    env_file: .env
    user: fedow
    links:
      - fedow_memcached:memcached
    volumes:
      - fedow_database_https:/home/fedow/Fedow/database
    networks:
      - backend
    command: "bash start.sh"
    extra_hosts:
      - "fedow.mydomain.com:172.17.0.1"
      - "lespass.mydomain.com:172.17.0.1"
      - "laboutik.mydomain.com:172.17.0.1"
      - "laboutik2.mydomain.com:172.17.0.1"

  fedow_nginx:
    image: nginx
    restart: unless-stopped
    container_name: fedow_nginx
    hostname: fedow_nginx
    volumes:
      - ./nginx/fedow_nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/logs
    depends_on:
      - fedow_django
    links:
      - fedow_django:fedow_django
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.routers.fedow_nginx.tls=true
      - traefik.http.routers.fedow_nginx.tls.certresolver=letsencrypt
      - traefik.http.routers.fedow_nginx.rule=Host(`fedow.mydomain.com`)
      - traefik.http.services.fedow_nginx.loadbalancer.server.port=80
    networks:
      - frontend
      - backend

  #########
  # TIBILLET MONOREPO
  #########

  lespass_postgres:
    image: postgres:13-bookworm
    restart: unless-stopped
    container_name: lespass_postgres
    hostname: lespass_postgres
    volumes:
      - lespass_https_db:/var/lib/postgresql/data
    env_file: .env
    networks:
      - backend

  lespass_memcached:
    image: memcached:1.6
    container_name: lespass_memcached
    hostname: lespass_memcached
    restart: unless-stopped
    networks:
      - backend

  lespass_redis:
    container_name: lespass_redis
    hostname: lespass_redis
    image: redis:7.2.3-bookworm
    restart: unless-stopped
    networks:
      - backend

  lespass_django:
    build: .
    restart: unless-stopped
    container_name: lespass_django
    hostname: lespass_django
    env_file: .env
    volumes:
      - ./:/DjangoFiles
    depends_on:
      - lespass_postgres
      - lespass_redis
      - lespass_memcached
    links:
      - lespass_postgres:postgres
      - lespass_redis:redis
      - lespass_memcached:memcached
    networks:
      - backend
    extra_hosts:
      - "fedow.mydomain.com:172.17.0.1"
      - "lespass.mydomain.com:172.17.0.1"
      - "laboutik.mydomain.com:172.17.0.1"
      - "laboutik2.mydomain.com:172.17.0.1"
    command: 'bash start_dev.sh'

  lespass_celery:
    build: .
    container_name: lespass_celery
    restart: unless-stopped
    hostname: lespass_celery
    env_file: .env
    volumes:
      - ./:/DjangoFiles
    depends_on:
      - lespass_postgres
      - lespass_redis
      - lespass_memcached
    links:
      - lespass_postgres:postgres
      - lespass_redis:redis
      - lespass_memcached:memcached
    networks:
      - backend
    extra_hosts:
      - "fedow.mydomain.com:172.17.0.1"
      - "lespass.mydomain.com:172.17.0.1"
      - "laboutik.mydomain.com:172.17.0.1"
      - "laboutik2.mydomain.com:172.17.0.1"
    command: "poetry run celery -A TiBillet worker -l INFO -B --concurrency=6"

  lespass_nginx:
    image: nginx:latest
    container_name: lespass_nginx
    restart: unless-stopped
    hostname: lespass_nginx
    links:
      - lespass_django:lespass_django
    volumes:
      - ./nginx/lespass_dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./www:/www
      - ./logs:/logs
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.routers.lespass_nginx.tls=true
      - traefik.http.routers.lespass_nginx.tls.certresolver=letsencrypt
      - traefik.http.routers.lespass_nginx.rule=Host(`mydomain.com`) || Host(`www.mydomain.com`) || Host(`agenda.mydomain.com`) || Host(`lespass.mydomain.com`) || Host(`demo.mydomain.com`)
      - traefik.http.services.lespass_nginx.loadbalancer.server.port=80
    networks:
      - backend
      - frontend

networks:
  frontend:
    external: true
  backend:

volumes:
  lespass_https_db:
  fedow_database_https:
