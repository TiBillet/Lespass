<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8"><title>Le Bar de Mike</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:20px;max-width:720px}
        .card{border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:16px}
        .badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eee}
        .badge.on{background:#d1f7c4}.badge.off{background:#ffd1d1}
        .stat{font-size:18px;margin:6px 0}.mono{font-family:ui-monospace,Consolas,monospace}#status{color:#666}
    </style></head>
    <body>
        <h1>Le Bar de Mike</h1><p><a href="/admin/">Admin</a></p>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  let onlyName = (params.get('tireuse_bec') || '').trim().toLowerCase();

  function ensureSingleCard() {
    // Créer la carte si elle n'existe pas
    let el = document.querySelector('#single-card');
    if (!el) {
      el = document.createElement('div');
      el.id = 'single-card';
      el.className = 'card';
      el.innerHTML = `
        <h2 style="margin-top:0">
          <span data-role="title">Liquide</span>
          <small style="color:#777">(<span data-role="name">—</span>)</small>
        </h2>
        <div class="stat">Vanne: <span class="badge off" data-role="etat">Fermée</span></div>
        <div>Carte présente: <b data-role="present">non</b></div>
        <div>UID: <span class="mono" data-role="uid">—</span></div>
        <div>Autorisation: <b data-role="auth">—</b></div>
        <div>Débit: <b data-role="debit">0.00</b> L/min &nbsp; Volume: <b data-role="volume">0</b> mL</div>
        <div style="font-size:24px;margin-top:10px;color:#2c3e50">💳 Solde: <b data-role="balance" style="color:#27ae60">—</b> €</div>
        <div data-role="msg" style="color:#555;margin-top:6px"></div>
      `;
      document.body.appendChild(el);
    }
    
    // Créer le popup séparément (hors de la carte)
    let popup = document.querySelector('#popup-message');
    if (!popup) {
      popup = document.createElement('div');
      popup.id = 'popup-message';
      popup.style.cssText = 'display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#2c3e50;color:white;padding:30px;border-radius:15px;text-align:center;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.3)';
      popup.innerHTML = `
        <div style="font-size:48px;margin-bottom:10px">🍺</div>
        <div style="font-size:20px;margin-bottom:10px">Bonne dégustation !</div>
        <div style="font-size:16px">Il vous reste <b data-role="popup-balance">—</b> € sur votre carte</div>
      `;
      document.body.appendChild(popup);
    }
    
    return {
      root: el,
      titleEl: el.querySelector('[data-role="title"]'),
      nameEl: el.querySelector('[data-role="name"]'),
      etat: el.querySelector('[data-role="etat"]'),
      present: el.querySelector('[data-role="present"]'),
      uid: el.querySelector('[data-role="uid"]'),
      auth: el.querySelector('[data-role="auth"]'),
      debit: el.querySelector('[data-role="debit"]'),
      volume: el.querySelector('[data-role="volume"]'),
      msg: el.querySelector('[data-role="msg"]'),
      balance: el.querySelector('[data-role="balance"]'),
      popup: popup,
      popupBalance: popup.querySelector('[data-role="popup-balance"]'),
    };
  }

  const card = ensureSingleCard();
  let lastBalance = null;
  let popupTimeout = null;

  function showPopup(balance) {
    if (card.popup && card.popupBalance) {
      card.popupBalance.textContent = balance;
      card.popup.style.display = 'block';
      // Force le popup au premier plan
      card.popup.style.zIndex = '9999';
      if (popupTimeout) clearTimeout(popupTimeout);
      popupTimeout = setTimeout(() => {
        card.popup.style.display = 'none';
      }, 5000);
    }
  }

  if (onlyName) {
    card.nameEl.textContent = onlyName;
    card.titleEl.textContent = 'Chargement…';
  }

  function wsUrlFromName(name){
    const proto = (location.protocol === 'https:') ? 'wss' : 'ws';
    if (!name || name === 'all') {
      return proto + '://' + location.host + '/ws/rfid/all/';
    }
    return proto + '://' + location.host + '/ws/rfid/' + encodeURIComponent(name) + '/';
  }

  let ws = null;
  function connect(){
    const wsUrl = wsUrlFromName(onlyName);
    console.log('🔌 Connecting to:', wsUrl);
    ws = new WebSocket(wsUrl);
    
    ws.onopen = () => console.log('🔌 WS Connected');
    ws.onclose = (e) => console.log('🔌 WS Closed:', e.code, e.reason);
    ws.onerror = (e) => console.log('🔌 WS Error:', e);

    ws.onmessage = (e) => {
      console.log('📨 WS Message brut:', e.data);
      const j = JSON.parse(e.data);
      console.log('📨 WS Message parsed:', j);
      console.log('📨 Balance:', j.balance, 'Present:', j.present, 'Volume:', j.volume_ml);

      if (j.redirect_to) {
        const newName = String(j.redirect_to).trim().toLowerCase();
        if (newName && newName !== onlyName) {
          onlyName = newName;
          const newParams = new URLSearchParams(location.search);
          newParams.set('tireuse_bec', newName);
          history.replaceState(null, '', location.pathname + '?' + newParams.toString());
          try { ws.close(); } catch(e){}
          setTimeout(connect, 100);
          return;
        }
      }

      const name = (j.tireuse_bec || onlyName || 'default').toLowerCase();

      if (onlyName && name !== onlyName) return;

      // Sauvegarder l'état précédent pour détecter le retrait de carte
      const wasPresent = card.present.textContent === 'oui';
      
      card.nameEl.textContent = name;
      card.titleEl.textContent = (j.liquid_label || 'Liquide');
      card.etat.textContent = j.vanne_ouverte ? 'Ouverte' : 'Fermée';
      card.etat.className = 'badge ' + (j.vanne_ouverte ? 'on' : 'off');
      card.present.textContent = j.present ? 'oui' : 'non';
      card.uid.textContent = j.uid || '—';
      card.auth.textContent = j.authorized ? 'autorisée' : 'refusée';
      card.debit.textContent = (j.debit_l_min || 0).toFixed(2);
      card.volume.textContent = Math.round(j.volume_ml || 0);
      card.msg.textContent = j.message || '';
      
      // Mettre à jour le solde
      if (j.balance !== undefined && j.balance !== null) {
        card.balance.textContent = j.balance;
        lastBalance = j.balance;
        card.msg.textContent = 'Solde: ' + j.balance + '€';
      }
      
      // Détecter le retrait de carte (était présente, maintenant absente)
      // et afficher le popup si on a servi quelque chose
      const currentVolume = parseFloat(j.volume_ml || 0);
      if (wasPresent && !j.present) {
        if (currentVolume > 0 && lastBalance) {
          // Service effectué - afficher popup
          showPopup(lastBalance);
        } else {
          // Carte retirée sans service (refusée ou pas de débit) - réinitialiser
          card.auth.textContent = '—';
          card.msg.textContent = 'En attente...';
          card.balance.textContent = '—';
        }
      }
    };

    ws.onclose = () => setTimeout(connect, 1000);
  }

  connect();
})();
</script>
</body></html>
