####
# PROD — utilise le Traefik externe (wildcard_conf)
# Ne pas lancer en même temps que docker-compose.yml (dev)
####
services:

  #### FEDOW ####
  fedow_memcached:
    image: memcached:1.6
    container_name: fedow_memcached
    hostname: fedow_memcached
    restart: always
    networks:
      - backend

  fedow_django:
    image: tibillet/fedow:latest
    container_name: fedow_django
    hostname: fedow_django
    restart: unless-stopped
    env_file: .env
    user: fedow
    links:
      - fedow_memcached:memcached
    volumes:
      - fedow_database:/home/fedow/Fedow/database
    networks:
      - backend
    command: "bash start.sh"

  fedow_nginx:
    image: nginx
    restart: unless-stopped
    container_name: fedow_nginx
    hostname: fedow_nginx
    volumes:
      - ./nginx/fedow_nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/logs
    depends_on:
      - fedow_django
    links:
      - fedow_django:fedow_django
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.routers.fedow_nginx.entrypoints=websecure
      - traefik.http.routers.fedow_nginx.tls=true
      - traefik.http.routers.fedow_nginx.tls.certresolver=le-alpn
      - traefik.http.routers.fedow_nginx.rule=Host(`fedow.${DOMAIN}`)
      - traefik.http.routers.fedow_nginx.priority=100
      - traefik.http.routers.fedow_nginx.middlewares=crowdsec@file
      - traefik.http.services.fedow_nginx.loadbalancer.server.port=80
    networks:
      - frontend
      - backend

  #########
  # LESPASS
  #########
  lespass_postgres:
    image: postgres:13-bookworm
    restart: unless-stopped
    container_name: lespass_postgres
    hostname: lespass_postgres
    volumes:
      - lespass_dev_db:/var/lib/postgresql/data
    env_file: .env
    networks:
      - backend

  lespass_memcached:
    image: memcached:1.6
    container_name: lespass_memcached
    hostname: lespass_memcached
    restart: unless-stopped
    networks:
      - backend

  lespass_redis:
    container_name: lespass_redis
    hostname: lespass_redis
    image: redis:7.2.3-bookworm
    restart: unless-stopped
    networks:
      - backend

  lespass_django:
    image: tibillet/lespass:latest
    restart: unless-stopped
    container_name: lespass_django
    hostname: lespass_django
#    volumes:
#      - ./:/DjangoFiles
    env_file: .env
    depends_on:
      - lespass_postgres
      - lespass_redis
      - lespass_memcached
    links:
      - lespass_postgres:postgres
      - lespass_redis:redis
      - lespass_memcached:memcached
    networks:
      - backend
    extra_hosts:
      - fedow.${DOMAIN}:172.17.0.1
      - laboutik.${DOMAIN}:172.17.0.1
      - lespass.${DOMAIN}:172.17.0.1
    command: "bash start_dev.sh"

  lespass_celery:
    image: tibillet/lespass:latest
    container_name: lespass_celery
    restart: unless-stopped
    hostname: lespass_celery
    env_file: .env
#    volumes:
#      - ./:/DjangoFiles
    depends_on:
      - lespass_postgres
      - lespass_redis
      - lespass_memcached
    links:
      - lespass_postgres:postgres
      - lespass_redis:redis
      - lespass_memcached:memcached
    networks:
      - backend
    extra_hosts:
      - fedow.${DOMAIN}:172.17.0.1
      - laboutik.${DOMAIN}:172.17.0.1
      - lespass.${DOMAIN}:172.17.0.1
    command: "poetry run celery -A TiBillet worker -l INFO -B --concurrency=6"

  lespass_nginx:
    image: nginx:latest
    container_name: lespass_nginx
    restart: unless-stopped
    hostname: lespass_nginx
    links:
      - lespass_django:lespass_django
    volumes:
      - ./nginx/lespass_dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./www:/www
      - ./logs:/logs
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.services.lespass_nginx.loadbalancer.server.port=80

      # Router A — wildcard OVH : *.DOMAIN + apex
#      - traefik.http.routers.lespass-ovh.entrypoints=websecure
#      - traefik.http.routers.lespass-ovh.tls=true
#      - traefik.http.routers.lespass-ovh.tls.certresolver=le-ovh
#      - traefik.http.routers.lespass-ovh.tls.domains[0].main=${DOMAIN}
#      - traefik.http.routers.lespass-ovh.tls.domains[0].sans=*.${DOMAIN}
#      - traefik.http.routers.lespass-ovh.rule=Host(`${DOMAIN}`) || Host(`lespass.${DOMAIN}`) || HostRegexp(`${DOMAIN_REGEX}`)
#      - traefik.http.routers.lespass-ovh.middlewares=crowdsec@file
#
#      # Router B — wildcard Gandi : *.DOMAIN_GANDI + apex
#      - traefik.http.routers.lespass-gandi.entrypoints=websecure
#      - traefik.http.routers.lespass-gandi.tls=true
#      - traefik.http.routers.lespass-gandi.tls.certresolver=le-gandi
#      - traefik.http.routers.lespass-gandi.tls.domains[0].main=${DOMAIN_GANDI}
#      - traefik.http.routers.lespass-gandi.tls.domains[0].sans=*.${DOMAIN_GANDI}
#      - traefik.http.routers.lespass-gandi.rule=Host(`${DOMAIN_GANDI}`) || HostRegexp(`${DOMAIN_GANDI_REGEX}`)
#      - traefik.http.routers.lespass-gandi.middlewares=crowdsec@file

      # Router C — hôte simple (TLS challenge)
      - traefik.http.routers.lespass-simple.entrypoints=websecure
      - traefik.http.routers.lespass-simple.tls=true
      - traefik.http.routers.lespass-simple.tls.certresolver=le-alpn
      - traefik.http.routers.lespass-simple.rule=Host(`${DOMAIN}`) || Host(`lespass.${DOMAIN}`)
      - traefik.http.routers.lespass-simple.middlewares=crowdsec@file


    networks:
      - backend
      - frontend

  #### CASHLESS 1 ####

  laboutik_postgres:
    image: postgres:11.5-alpine
    restart: always
    env_file: .env
    container_name: laboutik_postgres
    hostname: laboutik_postgres
    volumes:
      - laboutik_postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  laboutik_memcached:
    image: memcached:1.6
    container_name: laboutik_memcached
    hostname: laboutik_memcached
    restart: always
    networks:
      - backend

  laboutik_redis:
    image: redis:6-alpine
    restart: always
    env_file: .env
    container_name: laboutik_redis
    hostname: laboutik_redis
    networks:
      - backend

  laboutik_django:
    image: tibillet/laboutik:latest
    restart: always
    env_file: .env
    container_name: laboutik_django
    hostname: laboutik_django
#    volumes:
#      - ../LaBoutik:/DjangoFiles
    links:
      - laboutik_postgres:postgres
      - laboutik_redis:redis
      - laboutik_memcached:memcached
    depends_on:
      - laboutik_postgres
      - laboutik_redis
      - laboutik_memcached
    environment:
      # Override DOMAIN pour LaBoutik : sous-domaine du service, pas le wildcard tenant.
      # Resolu par compose via le .env (DOMAIN=tibillet.localhost) -> laboutik.tibillet.localhost.
      DOMAIN: laboutik.$DOMAIN
    command: 'bash start_dev.sh'
    extra_hosts:
      - fedow.${DOMAIN}:172.17.0.1
      - laboutik.${DOMAIN}:172.17.0.1
      - lespass.${DOMAIN}:172.17.0.1
    networks:
      - backend

  laboutik_celery:
    image: tibillet/laboutik:latest
    restart: always
    env_file: .env
    container_name: laboutik_celery
    hostname: laboutik_celery
    environment:
      # Override DOMAIN pour LaBoutik : sous-domaine du service, pas le wildcard tenant.
      # Resolu par compose via le .env (DOMAIN=tibillet.localhost) -> laboutik.tibillet.localhost.
      DOMAIN: laboutik.$DOMAIN
    volumes:
      - laboutik_www:/DjangoFiles/www # pour partage des statics
#      - ../LaBoutik:/DjangoFiles
    links:
      - laboutik_postgres:postgres
      - laboutik_redis:redis
      - laboutik_memcached:memcached
    depends_on:
      - laboutik_postgres
      - laboutik_django
      - laboutik_memcached
    command: "bash start_celery.sh"
    extra_hosts:
      - fedow.${DOMAIN}:172.17.0.1
      - laboutik.${DOMAIN}:172.17.0.1
      - lespass.${DOMAIN}:172.17.0.1
    networks:
      - backend


  laboutik_nginx:
    image: nginx
    restart: always
    container_name: laboutik_nginx
    hostname: laboutik_nginx
    depends_on:
      - laboutik_django
    links:
      - laboutik_django:laboutik_django
    volumes:
      - laboutik_www:/DjangoFiles/www
      - nginx_laboutik_logs:/DjangoFiles/logs
      - ./nginx/laboutik_nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.routers.laboutik_nginx.tls.certresolver=myresolver
      - traefik.http.routers.laboutik_nginx.rule=Host(`laboutik.$DOMAIN`)
      - traefik.http.routers.laboutik_nginx.priority=100 # plus c'est grand, plus c'est prioritaire
    networks:
      - frontend
      - backend

networks:
  frontend:
    external: true
  backend:

volumes:
  lespass_dev_db:
  fedow_database:
  fedow_dev_db:
  laboutik_postgres_data:
  laboutik_www:
  nginx_laboutik_logs:



# Données persistantes dans ./data/ (bind mounts)
# - ./data/postgres   : base PostgreSQL Lespass
# - ./data/fedow      : base Fedow
