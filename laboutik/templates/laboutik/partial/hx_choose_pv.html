{% load i18n %}
<div>
    <h3>{% translate "Choisir un point de vente" %}</h3>
    {% for pv in points_de_vente %}
    <button hx-get="{% url 'laboutik-caisse-point_de_vente' %}?uuid_pv={{ pv.uuid }}&tag_id_cm={{ tag_id_cm }}"
            hx-target="body" hx-swap="innerHTML" hx-push-url="true"
            class="btn-pv" data-testid="btn-pv-{{ pv.name|slugify }}">
        {{ pv.name }}
    </button>
    {% endfor %}
</div>
