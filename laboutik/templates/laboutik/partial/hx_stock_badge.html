{% load i18n %}{% for produit in produits_stock %}<div id="stock-badge-{{ produit.product_uuid }}" hx-swap-oob="outerHTML" aria-live="polite" data-testid="stock-badge-{{ produit.product_uuid }}" {% if produit.bloquant %}data-stock-bloquant="true"{% endif %}>{% if produit.en_alerte %}<span class="article-stock-badge article-stock-badge-alerte" data-testid="stock-badge-alerte">{{ produit.quantite_lisible }}</span>{% elif produit.en_rupture %}<span class="article-stock-badge article-stock-badge-rupture" data-testid="stock-badge-rupture">{% translate "Épuisé" %}</span>{% endif %}</div>{% endfor %}
