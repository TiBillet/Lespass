{% load static i18n %}

<!--
ECRAN ATTENTE LECTURE CARTE NFC (check carte)
/ NFC card read waiting screen (card check)

LOCALISATION : laboutik/templates/laboutik/partial/hx_check_card.html

Ce partial est injecte dans #messages via innerHTML (pas outerHTML).
On ne met PAS id="messages" sur le composant read-nfc car l'element
#messages existe deja dans base.html.
Note : le listener 'tarifSelection' est sur #articles-zone (tarif.js), pas #messages.
/ This partial is injected into #messages via innerHTML (not outerHTML).
We do NOT set id="messages" on the read-nfc component because the #messages
element already exists in base.html.
Note: 'tarifSelection' listener is on #articles-zone (tarif.js), not #messages.
-->
<c-read-nfc selector="#messages" event-manage-form="checkCardManageForm" submit-url="{% url 'laboutik-paiement-retour_carte' %}">
  <form id="form-check-nfc" class="hide" hx-post="{% url 'laboutik-paiement-retour_carte' %}" hx-trigger="" hx-target="#messages"
    hx-swap="innerHTML">
    {% csrf_token %}
    <input id="nfc-tag-id" name="tag_id" />
  </form>
  <h1>{% translate "Attente lecture carte" %}</h1>

  <script>
    // gestionnaire de formulaire
    function checkCardManageForm(event) {
      console.log('-> checkCardManageForm, event.detail =', event.detail);
      
      try {
        const data = event.detail
        const form = document.querySelector('#form-check-nfc')

        // update input
        if (data.actionType === 'updateInput') {
          form.querySelector(data.selector).value = data.value
        }

        // change post url
        if (data.actionType === 'postUrl') {
          form.setAttribute('hx-post', data.value)
          htmx.process(form)
        }

        // submit form
        if (data.actionType === 'submit') {
          form.setAttribute('hx-trigger', 'click')
          htmx.process(form)
          // submit
          form.click()
        }

      } catch (error) {
        console.log('-> hx_check_card - checkCardManageForm,', error)
      }
    }
    // écoute des commandes sur le formulaire "#form-nfc"
    document.querySelector('#form-check-nfc').addEventListener('checkCardManageForm', checkCardManageForm)
  </script>
</c-read-nfc>
