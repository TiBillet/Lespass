{% load static i18n %}
<!--
ATTENTE LECTURE NFC — variante adhesion
Identique a hx_read_nfc.html mais la soumission va vers identifier_membre.
/ NFC read waiting screen — membership variant.
Same as hx_read_nfc.html but submits to identifier_membre.

LOCALISATION : laboutik/templates/laboutik/partial/hx_read_nfc_adhesion.html
-->

<div id="confirm">
	<c-read-nfc id="confirm" selector="#confirm" event-manage-form="additionManageForm" submit-url="{% url 'laboutik-paiement-identifier_membre' %}">
		<h1>{% translate "Attente lecture carte" %}</h1>
		<p style="opacity: 0.7; font-size: 1rem;">{% translate "Posez la carte TiBillet du membre" %}</p>

		{# --- Champ cache pour propager le moyen de paiement --- #}
		<input type="hidden" name="moyen_paiement" value="{{ method|default:'nfc' }}" />

		<style>
			#confirm {
				position: absolute;
				left: 0;
				top: 0;
				width: 100%;
				height: 100%;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				background-color: var(--noir01);
				color: var(--blanc01);
			}

			#message-nfc {
				flex-direction: row;
				justify-content: center;
				align-items: center;
				font-weight: bold;
				white-space: pre-line;
				text-align: center;
			}
		</style>
	</c-read-nfc>
