	<link rel="stylesheet" href="{% static 'css/components.css' %}" />
	<link rel="stylesheet" href="{% static 'css/header.css' %}" />
	<link rel="stylesheet" href="{% static 'css/categories.css' %}" />
	<link rel="stylesheet" href="{% static 'css/articles.css' %}" />

<!-- <body id="contenu" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-on::before-request="spinnerRequestOn()"
	hx-on::after-request="spinnerRequestOff()" style="background-color:#000000;"> -->
<body id="contenu" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-ext="loading-states" style="background-color:#000000;">
	{% block content %} {% endblock content %}

	<!-- SPINNER DE CHARGEMENT — extension loading-states officielle.
	     data-loading="flex" : l'extension montre l'element en display:flex pendant la requete.
	     data-loading-delay="400" : pas de blink si la requete est rapide (< 400ms).
	     [data-loading] { display:none } cache l'overlay par defaut (regle CSS ci-dessous).
	     Le spinner est global (pas de data-loading-states scope) : il se declenche sur
	     TOUTE requete HTMX de la page.
	     / LOADING SPINNER — official loading-states extension.
	     data-loading="flex": extension shows element as display:flex during request.
	     data-loading-delay="400": no blink on fast requests (< 400ms).
	     [data-loading] { display:none } hides overlay by default (CSS rule below).
	     Global spinner (no scope): triggers on ANY HTMX request on the page. -->
	<div id="laboutik-spinner"
	     data-loading="flex"
	     data-loading-delay="400"
	     aria-hidden="true"
	     style="position:fixed;inset:0;z-index:9999;justify-content:center;align-items:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);">
		<div role="status"
		     style="width:3rem;height:3rem;border-radius:50%;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--vert01,#00e676);animation:laboutik-spin 0.7s linear infinite;">
			<span class="visually-hidden">{% load i18n %}{% translate "Chargement..." %}</span>
		</div>
	</div>
	<style>
		[data-loading] { display: none; }
		@keyframes laboutik-spin { to { transform: rotate(360deg); } }
		@media (prefers-reduced-motion: reduce) {
			#laboutik-spinner > div { animation: none; opacity: 0.6; }
		}
	</style>

	<!--
	OVERLAY LAYERS — couches superposees pour messages et confirmations.
	/ Overlay layers — stacked layers for messages and confirmations.

	LOCALISATION : laboutik/templates/laboutik/base.html

	#messages (layer 1) : check carte, types de paiement, adhesion, cloture.
	#confirm  (layer 2) : confirmation NFC, lecture carte paiement.

	Les partials sont injectes via innerHTML (pas outerHTML) pour preserver
	les event listeners sur ces elements (ex: tarif.js attache 'tarifSelection'
	sur #messages au DOMContentLoaded).
	/ Partials are injected via innerHTML (not outerHTML) to preserve
	event listeners on these elements (e.g. tarif.js attaches 'tarifSelection'
	on #messages at DOMContentLoaded).

	DEUX MECANISMES pour que innerHTML fonctionne comme outerHTML :

	1. Listener global htmx:afterSwap (script ci-dessous) :
	   hideAndEmptyElement() ajoute .hide sur #messages quand on ferme
	   un overlay. Le listener retire .hide quand du contenu est injecte
	   par HTMX (sinon l'overlay reste invisible).
	   / hideAndEmptyElement() adds .hide when closing an overlay.
	   The listener removes .hide when HTMX injects content
	   (otherwise the overlay stays invisible).

	2. #messages > :first-child { width: 100%; height: 100% } :
	   Les partials injectes via innerHTML sont des enfants de #messages,
	   pas l'element lui-meme. Sans 100% height, le centrage vertical casse.
	   / Partials are children of #messages, not the element itself.
	   Without 100% height, vertical centering breaks.
	-->
	<div id="messages"></div>
	<div id="confirm"></div>
	<script src="http://localhost/cordova.js"></script>
	<script src="{% static 'js/htmx@2.0.6.min.js' %}"></script>
	<!-- Extension loading-states — spinner avec delai configurable (pas de blink si requete rapide)
	     / loading-states extension — spinner with configurable delay (no blink on fast requests) -->
	<script src="{% static 'mvt_htmx/js/loading-states.js' %}"></script>
	<!-- Extension WebSocket HTMX — push serveur vers navigateur (jauges, notifications)
	     / HTMX WebSocket extension — server push to browser (gauges, notifications) -->
	<script src="{% static 'js/ext/ws.js' %}"></script>
	<script src="{% static 'js/socket.io.3.0.4.js' %}"></script>
	<script>
		/**
		 * Retire la classe .hide des overlays #messages et #confirm
		 * quand HTMX y injecte du contenu (innerHTML swap).
		 * / Removes the .hide class from #messages and #confirm overlays
		 * when HTMX injects content (innerHTML swap).
		 *
		 * LOCALISATION : laboutik/templates/laboutik/base.html
		 *
		 * POURQUOI : hideAndEmptyElement() ajoute .hide (display:none) quand
		 * on ferme un overlay. Avec outerHTML, l'element etait remplace
		 * entierement (pas de .hide residuel). Avec innerHTML, l'element
		 * garde ses classes — il faut retirer .hide manuellement.
		 * / WHY: hideAndEmptyElement() adds .hide when closing an overlay.
		 * With outerHTML, the element was fully replaced (no leftover .hide).
		 * With innerHTML, the element keeps its classes — we must remove .hide.
		 *
		 * htmx:afterSwap est declenche sur l'element source (ex: #addition-form),
		 * pas sur la cible (#messages). On ecoute donc sur document.body
		 * et on verifie event.detail.target.
		 * / htmx:afterSwap fires on the source element, not the target.
		 * So we listen on document.body and check event.detail.target.
		 */
		document.addEventListener('htmx:afterSwap', function (event) {
			const elementCible = event.detail.target
			const cibleEstOverlay = (
				elementCible.id === 'messages' || elementCible.id === 'confirm'
			)
			if (cibleEstOverlay) {
				elementCible.classList.remove('hide')
			}
		})
	</script>
	{% block script %} {% endblock script %}
	<div id="event-organizer" class="hide"></div>
</body>

</html>
