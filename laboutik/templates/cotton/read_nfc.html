{% load static %}
<div {{ attrs }} class="nfc-container">
	<c-spinner size="240" />
	<div class="nfc-container-slot">
		{{ slot }}
		<!-- reference(id) for the insertion of simulation buttons -->
		<div id="nfc-simu-tag"></div>
		{% if selector %}
		<c-bt.return selector="{{selector}}" />
		{% endif %}
	</div>

	<script>
		<!-- initNfc est une fonction dynamique construite par coton, --> 
		<!-- elle doit être lancée après la mise à jour du state      -->
		<!-- par un fichier de configuration, persistance des données -->
		function initNfc() {
			console.log('-> initNfc , state =', state)
			try {
				
				// start read nfc
				state.nfc.start({ eventManageForm: '{{ event_manage_form }}', submitUrl: '{{ submit_url }}' })
			} catch (error) {
				console.log('-> Cotton - read_nfc.html - initNfc,', error)
			}
		}
	</script>

</div>
