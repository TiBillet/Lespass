{% load static %}
<div {{ attrs }} class="nfc-container">
  <c-spinner size="240" />
  <div class="nfc-container-slot">
    {{ slot }}
    <!-- reference(id) for the insertion of simulation buttons -->
    <div id="nfc-simu-tag"></div>
    {% if selector %}
    <c-bt.return selector="{{selector}}" action="state.nfc.stop()" />
    {% endif %}
  </div>

  <script>
    async function initNfc(typeApp) {
      console.log('-> initNfc');
      try {
        /*
        if (!state.nfc) {
          console.log('Première instanciations de nfc !')
          state['nfc'] = new NfcReader(3000, typeApp)
        }
          */
        state['nfc'] = null
        state.nfc = new NfcReader(3000, typeApp)
        // start read nfc
        await state.nfc.start({ eventManageForm: '{{ event_manage_form }}', submitUrl: '{{ submit_url }}' })
      } catch (error) {
        console.log('-> Cotton - read_nfc.html - initNfc,', error)
      }
    }

    if (state.typeApp === 'cordova') {
      // cordova attent que les périphériques soient pris en compte
      document.addEventListener('deviceready', async () => {
        console.log('-> cordova device ready');

        initNfc(state.typeApp)
      })
    }

    /*
