{% load static %}
<div {{ attrs }} class="nfc-container">
	<c-spinner size="240" />
	<div class="nfc-container-slot">
		{{ slot }}
		<!-- reference(id) for the insertion of simulation buttons -->
		<div id="nfc-simu-tag"></div>
		{% if selector %}
		<c-bt.return selector="{{selector}}" />
		{% endif %}
	</div>

	<script>
		function initNfc() {
			try {		
			const nfc = new NfcReader()
			// start read nfc
			nfc.start({eventManageForm: '{{ event_manage_form }}', submitUrl: '{{ submit_url }}'})
			} catch (error) {
				console.log('-> Cotton - read_nfc.html - initNfc,', error)
			}
		}
			initNfc()
	</script>

</div>
