{% load static i18n %}

<div id="addition">
	<div class="addition-legend-grid">
		<div></div>
		<div>{% translate "PRODUIT" %}</div>
		<div>{% translate "PRIX" %}</div>
	</div>
	<div id="addition-list" data-empty-text="{% translate 'Panier vide' %}" aria-live="polite">
		<div id="addition-empty" class="BF-col addition-placeholder" data-testid="addition-empty-placeholder">
			<i class="fas fa-shopping-basket" aria-hidden="true"></i>
			<span>{% translate "Panier vide" %}</span>
		</div>
	</div>
	<!-- IMPORTANT — innerHTML et non outerHTML sur #messages :
	L'element #messages porte un listener 'tarifSelection' (tarif.js)
	attache au DOMContentLoaded. outerHTML remplacerait l'element DOM
	et le listener serait perdu (les articles multi-tarif ne repondent plus).
	/ IMPORTANT — innerHTML not outerHTML on #messages:
	The #messages element has a 'tarifSelection' listener (tarif.js)
	attached on DOMContentLoaded. outerHTML would replace the DOM element
	and lose the listener (multi-rate articles would stop responding). -->
	<form id="addition-form" class="hide"
		hx-post="{% url 'laboutik-paiement-moyens_paiement' %}"
		hx-trigger="validerPaiement"
		hx-target="#messages"
		hx-swap="innerHTML"
		hx-on::after-request="hideAndEmptyElement('#confirm')"
		data-url-reset="{% url 'laboutik-paiement-moyens_paiement' %}">
		<input type="text" name="id_table" value="{{ id_table }}" />
		<input type="text" name="uuid_pv" value="{{ pv.id }}" />
		<input type="text" name="responsable" value="{{ card.name }}" />
		<input type="text" name="tag_id_cm" value="{{ card.tag_id }}" />
		<input type="text" id="nfc-tag-id" name="tag_id" />
		<input type="text" id="addition-comportement" name="comportement" value="{{ pv.comportement }}" />
		<input type="number" id="addition-total" name="total" value="" />
		<input type="text" id="addition-moyen-paiement" name="moyen_paiement" value="" />
		<input type="text" id="addition-hostname-client" name="hostname_client" value="{{ hostname_client }}" />
		<input type="text" id="addition-uuid-transaction" name="uuid_transaction" value="" />
		<input type="number" id="addition-given-sum" name="given_sum" value="" />
	</form>
</div>

<script src="{% static 'js/addition.js' %}"></script>

<style>
	#addition {
		display: none;
		flex-direction: column;
		width: 100%;
		height: 100%;
		color: var(--blanc01);
	}

	#addition-list {
		width: 100%;
		/* dev */
		/* height: calc(var(--addition-list-heigh) - var(--addition-legend-heigh)); */
		height: calc(100% - var(--addition-legend-heigh));
		overflow-y: auto;
		scrollbar-width: none
	}

	/* En-tête du panier / Cart header */
	.addition-legend-grid {
		width: 100%;
		height: 28px;
		display: grid;
		grid-template-columns: 48px 1fr auto;
		align-items: center;
		padding: 0 12px 0 8px;
		font-size: 11px;
		font-weight: 700;
		text-transform: uppercase;
		letter-spacing: 0.05em;
		color: var(--gris07);
		border-bottom: 1px solid var(--gris02);
	}

	/* Ligne article du panier — carte avec fond subtil
	   / Cart item line — card with subtle background */
	.addition-line-grid {
		display: grid;
		grid-template-columns: 48px 1fr auto;
		align-items: center;
		min-height: 52px;
		margin: 4px 6px;
		padding: 6px 10px 6px 0;
		border-radius: 10px;
		background-color: rgba(255, 255, 255, 0.04);
		border-bottom: 1px solid rgba(255, 255, 255, 0.06);
		color: var(--blanc01);
		transition: background-color 150ms ease;
	}

	.addition-line-grid:active {
		background-color: rgba(255, 255, 255, 0.08);
	}

	/* Bouton supprimer — cercle tactile 40px
	   / Remove button — 40px touch circle */
	.addition-col-bt {
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.addition-col-bt .addition-remove-btn {
		display: flex;
		align-items: center;
		justify-content: center;
		width: 36px;
		height: 36px;
		border-radius: 50%;
		background-color: var(--rouge07);
		color: var(--blanc01);
		font-size: 1.1rem;
		cursor: pointer;
		transition: background-color 150ms ease, transform 100ms ease;
		border: none;
		-webkit-tap-highlight-color: transparent;
	}

	.addition-col-bt .addition-remove-btn:active {
		background-color: var(--rouge03);
		transform: scale(0.9);
	}

	/* Bloc nom + quantité / Name + quantity block */
	.addition-col-info {
		display: flex;
		flex-direction: column;
		gap: 2px;
		overflow: hidden;
		padding-left: 4px;
	}

	.addition-col-name {
		font-size: 15px;
		font-weight: 600;
		white-space: nowrap;
		overflow: hidden;
		text-overflow: ellipsis;
	}

	.addition-col-quantity-label {
		font-size: 12px;
		color: var(--gris07);
		font-variant-numeric: tabular-nums;
	}

	/* Prix à droite / Price on the right */
	.addition-col-price {
		font-size: 16px;
		font-weight: 700;
		font-variant-numeric: tabular-nums;
		white-space: nowrap;
		padding-left: 8px;
	}

	.addition-placeholder {
		height: 100%;
		opacity: 0.4;
		color: var(--gris03);
		font-size: 1.2rem;
		gap: 12px;
	}

	.addition-placeholder i {
		font-size: 2.5rem;
	}

	#addition-form {
		display: none;
	}

	.addition-include-data {
		display: none;
	}

	/* pour une largeur supérieure 1022 pixels */
	@media only screen and (width > 1022px) {
		#addition {
			display: flex;
			flex-direction: column;
			width: 29%;
			background-color: var(--gris10);
		}
	}
</style>
