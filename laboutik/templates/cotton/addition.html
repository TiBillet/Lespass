{% load static i18n %}

<div id="addition">
	<div class="addition-legend-grid">
		<div></div>
		<div>{% translate "QTE" %}</div>
		<div>{% translate "PRODUIT" %}</div>
		<div>{% translate "PRIX" %}</div>
	</div>
	<div id="addition-list" data-empty-text="{% translate 'Panier vide' %}">
		<div id="addition-empty" class="BF-col addition-placeholder" data-testid="addition-empty-placeholder">
			<i class="fas fa-shopping-basket" aria-hidden="true"></i>
			<span>{% translate "Panier vide" %}</span>
		</div>
	</div>
	<form id="addition-form" class="hide"
		hx-post="{% url 'laboutik-paiement-moyens_paiement' %}"
		hx-trigger="validerPaiement"
		hx-target="#messages"
		hx-swap="outerHTML"
		hx-on::after-request="hideAndEmptyElement('#confirm')"
		data-url-reset="{% url 'laboutik-paiement-moyens_paiement' %}">
		<input type="text" name="id_table" value="{{ id_table }}" />
		<input type="text" name="uuid_pv" value="{{ pv.id }}" />
		<input type="text" name="responsable" value="{{ card.name }}" />
		<input type="text" name="tag_id_cm" value="{{ card.tag_id }}" />
		<input type="text" id="nfc-tag-id" name="tag_id" />
		<input type="text" id="addition-comportement" name="comportement" value="{{ pv.comportement }}" />
		<input type="number" id="addition-total" name="total" value="" />
		<input type="text" id="addition-moyen-paiement" name="moyen_paiement" value="" />
		<input type="text" id="addition-hostname-client" name="hostname_client" value="{{ hostname_client }}" />
		<input type="text" id="addition-uuid-transaction" name="uuid_transaction" value="" />
		<input type="number" id="addition-given-sum" name="given_sum" value="" />
	</form>
</div>

<script src="{% static 'js/addition.js' %}"></script>

<style>
	#addition {
		display: none;
		flex-direction: column;
		width: 100%;
		height: 100%;
		color: var(--blanc01);
	}

	#addition-list {
		width: 100%;
		/* dev */
		/* height: calc(var(--addition-list-heigh) - var(--addition-legend-heigh)); */
		height: calc(100% - var(--addition-legend-heigh));
		overflow-y: auto;
		scrollbar-width: none
	}

	/* Grille panier : colonnes 16% / 12% / 56% / 16%
	   FIX : la 1ère colonne (bouton "-") passée de 12% à 16% pour respecter
	   le seuil tactile de 44px minimum (WCAG 2.5.8).
	   min-height passé de 29px (variable) à 44px fixe.
	   / Cart grid: columns 16% / 12% / 56% / 16%
	   FIX: 1st column ("-" button) widened from 12% to 16% to meet
	   the 44px minimum touch target (WCAG 2.5.8).
	   min-height changed from 29px (variable) to 44px fixed. */
	.addition-legend-grid {
		width: 100%;
		height: 20px;
		display: grid;
		grid-template-columns: 16% 12% 56% 16%;
		font-size: 14px;
		font-weight: 600;
		color: var(--gris03);
		border-bottom: 1px solid var(--gris07);
	}

	.addition-line-grid {
		width: 100%;
		min-height: 44px;
		display: grid;
		grid-template-columns: 16% 12% 56% 16%;
		color: var(--blanc01);
		font-size: 16px;
		font-weight: 400;
		margin: 8px 0;
	}

	.addition-col-bt {
		font-size: 1.8rem;
		/* background-color: aqua; */
	}

	.addition-col-number,
	.addition-col-name,
	.addition-col-price {
		overflow: hidden;
	}

	.addition-col-price,
	.addition-col-quantity {
		font-variant-numeric: tabular-nums;
	}

	.addition-placeholder {
		height: 100%;
		opacity: 0.4;
		color: var(--gris03);
		font-size: 1.2rem;
		gap: 12px;
	}

	.addition-placeholder i {
		font-size: 2.5rem;
	}

	#addition-form {
		display: none;
	}

	.addition-include-data {
		display: none;
	}

	/* pour une largeur supérieure 1022 pixels */
	@media only screen and (width > 1022px) {
		#addition {
			display: flex;
			flex-direction: column;
			width: 29%;
			background-color: var(--gris10);
		}
	}
</style>
