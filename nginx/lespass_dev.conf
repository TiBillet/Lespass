server {

    listen 80;
    server_name localhost;

    access_log /logs/nginxAccess.log;
    error_log /logs/nginxError.log;

#    location /static {
#        root /www;
#    }
    # Voir nginx_prod/lespass_prod.conf pour le detail : /media ne passe pas
    # par Django, le dossier est partage par tous les tenants, et un fichier
    # executable qui s'y trouverait s'executerait sur l'origine de n'importe
    # quel tenant. On garde la meme regle qu'en prod pour que le dev reproduise
    # le comportement reel.
    # / Same rule as prod so dev mirrors real behaviour.
    location ~* ^/media/.*\.(html?|xhtml|shtml|js|mjs|svg|svgz|xml|php\d?|phtml|pht|py|sh)$ {
        return 404;
    }

    location /media {
        root /www;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        # Pas de HSTS en dev (HTTP local) ; en prod ce bloc recopie aussi
        # HSTS et Permissions-Policy, cf. nginx_prod/lespass_prod.conf.
        # / No HSTS in dev; prod also copies HSTS + Permissions-Policy here.
    }

    location / {
        # everything is passed to Gunicorn
        proxy_pass http://lespass_django:8002;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        client_max_body_size 12M;
        # nico tests
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $server_name;
    }

}
include mime.types;
types {
    # here are additional types
    application/javascript js mjs;
}
