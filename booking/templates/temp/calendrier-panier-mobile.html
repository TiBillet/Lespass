<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier panier — mobile</title>
<style>
  :root{
    --bg:#F7F6F2; --surface:#FFFFFF; --surface2:#F1EFE8;
    --text:#1f1f1d; --text2:#5F5E5A; --text3:#9a9994;
    --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.22);
    --violet:#26215C; --violet-light:#CECBF6; --violet-mid:#534AB7;
    --grad:linear-gradient(135deg,#E0529F,#EF7B35,#E3C53F,#4FB477,#37A6C4);
    --pink:#E0529F;
    --radius-md:8px; --radius-lg:12px; --radius-xl:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .phone{
    width:100%; max-width:380px; background:var(--surface2);
    border-radius:var(--radius-lg); padding:12px; position:relative; overflow:hidden;
  }
  .topbar{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  select.res{
    flex:1; font-size:14px; padding:8px 10px; border-radius:var(--radius-md);
    border:0.5px solid var(--border); background:var(--surface); color:var(--text);
  }
  .cart-btn{
    position:relative; padding:8px 11px; border-radius:var(--radius-md);
    border:0.5px solid var(--border2); background:var(--surface); cursor:pointer; font-size:18px; line-height:1;
  }
  .cart-count{
    position:absolute; top:-5px; right:-5px; background:var(--pink); color:#fff;
    font-size:11px; min-width:18px; height:18px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 3px; font-weight:600;
  }
  .week-nav{display:flex; align-items:center; gap:4px; margin-bottom:10px;}
  .week-arrow{
    padding:4px 7px; border-radius:var(--radius-md); border:0.5px solid var(--border2);
    background:var(--surface); cursor:pointer; font-size:14px; color:var(--text2);
  }
  .week{flex:1; display:flex; gap:3px;}
  .wd{
    flex:1; text-align:center; font-size:11px; line-height:1.25; padding:5px 0;
    border-radius:7px; color:var(--text2); cursor:pointer; user-select:none;
  }
  .wd b{display:block; font-size:13px; color:var(--text); font-weight:600; margin-top:1px;}
  .wd.sel{background:var(--violet);}
  .wd.sel, .wd.sel b{color:#fff;}
  .grid-wrap{
    background:var(--surface); border:0.5px solid var(--border);
    border-radius:var(--radius-md); overflow:hidden;
  }
  .grid-head{display:grid; grid-template-columns:36px 1fr 1fr; border-bottom:0.5px solid var(--border);}
  .grid-head .h{text-align:center; font-size:12px; font-weight:600; padding:8px 0;}
  .grid-head .h+.h{border-left:0.5px solid var(--border);}
  .grid-scroll{max-height:320px; overflow-y:auto;}
  .grid{display:grid; grid-template-columns:36px 1fr 1fr;}
  .tl{font-size:10px; color:var(--text3); text-align:right; padding:0 6px; height:30px; line-height:30px;}
  .c{height:30px; border-bottom:0.5px solid var(--border); cursor:pointer;}
  .c.l{border-left:0.5px solid var(--border);}
  .c.free:active{background:var(--surface2);}
  .c.busy{background:var(--surface2); cursor:not-allowed;}
  .c.cart{background:var(--grad);}
  .c.sel{background:var(--violet-light); box-shadow:inset 0 0 0 2px var(--violet-mid);}
  .legend{display:flex; gap:14px; font-size:11px; color:var(--text2); padding:10px 2px 2px;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .sw{width:11px; height:11px; border-radius:2px; display:inline-block;}

  .overlay{
    position:absolute; inset:0; background:rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition:opacity .22s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:absolute; left:0; right:0; bottom:0; background:var(--surface);
    border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:8px 18px 20px;
    transform:translateY(110%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
  }
  .sheet.show{transform:translateY(0);}
  .handle{width:38px; height:4px; border-radius:2px; background:var(--border2); margin:5px auto 16px;}
  .sheet-head{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  .dot{width:9px; height:9px; border-radius:2px; background:var(--grad); flex-shrink:0;}
  .sheet-title{font-size:16px; font-weight:600;}
  .sheet-sub{font-size:12px; color:var(--text2); margin-top:1px;}
  .times{display:flex; gap:10px; align-items:stretch; margin-bottom:16px;}
  .time-box{flex:1; border-radius:var(--radius-md); padding:9px 12px;}
  .time-box.start{background:var(--surface2);}
  .time-box.end{border:0.5px solid var(--border2);}
  .time-lbl{font-size:11px; color:var(--text2); margin-bottom:3px;}
  .time-val{font-size:18px; font-weight:600;}
  .time-box.end select{
    border:none; background:transparent; font-size:18px; font-weight:600;
    color:var(--text); padding:0; width:100%; -webkit-appearance:none; appearance:none; cursor:pointer;
  }
  .arrow{display:flex; align-items:center; color:var(--text3); font-size:18px;}
  .meta{display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-bottom:16px; padding:0 2px; color:var(--text2);}
  .meta b{color:var(--text); font-weight:600;}
  .add-btn{
    width:100%; border:none; color:#fff; background:var(--grad); font-weight:600;
    height:46px; border-radius:var(--radius-md); font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .toast{
    position:absolute; left:50%; bottom:84px; transform:translateX(-50%) translateY(8px);
    background:var(--violet); color:#fff; font-size:13px; padding:9px 16px;
    border-radius:20px; opacity:0; pointer-events:none; transition:all .25s ease; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="phone">

  <div class="topbar">
    <select class="res">
      <option>Découpe laser — Trotec</option>
      <option>Imprimante 3D — Prusa MK4</option>
      <option>Salle — Le Forum</option>
    </select>
    <button class="cart-btn" aria-label="Mon panier">
      🛒<span class="cart-count" id="cartCount">2</span>
    </button>
  </div>

  <div class="week-nav">
    <button class="week-arrow" aria-label="Semaine précédente">‹</button>
    <div class="week" id="week"></div>
    <button class="week-arrow" aria-label="Semaine suivante">›</button>
  </div>

  <div class="grid-wrap">
    <div class="grid-head">
      <div></div>
      <div class="h">Mar 17</div>
      <div class="h">Mer 18</div>
    </div>
    <div class="grid-scroll">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="legend">
    <span><span class="sw" style="border:0.5px solid var(--border2); background:var(--surface);"></span>Libre</span>
    <span><span class="sw" style="background:var(--surface2);"></span>Occupé</span>
    <span><span class="sw" style="background:var(--grad);"></span>Panier</span>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <div class="sheet-head">
      <span class="dot"></span>
      <div>
        <div class="sheet-title">Découpe laser</div>
        <div class="sheet-sub" id="sheetDay">Mardi 17 juin</div>
      </div>
    </div>
    <div class="times">
      <div class="time-box start">
        <div class="time-lbl">Début</div>
        <div class="time-val" id="startVal">11:00</div>
      </div>
      <div class="arrow">→</div>
      <div class="time-box end">
        <div class="time-lbl">Fin</div>
        <select id="endSel"></select>
      </div>
    </div>
    <div class="meta">
      <span id="durLine">Durée 1h · tarif selon l'item</span>
      <b id="priceVal">12,00 €</b>
    </div>
    <button class="add-btn" id="addBtn">+ Ajouter au panier</button>
  </div>

  <div class="toast" id="toast">Ajouté au panier</div>

</div>

<script>
(function(){
  var times=[];
  for(var h=9; h<18; h++){ times.push(h+':00'); times.push(h+':30'); }

  var busyA=new Set([6,7]), cartA=new Set([1,2]);
  var busyB=new Set([8,9]);

  var grid=document.getElementById('grid');
  var selCell=null, selIndex=null;

  function render(){
    grid.innerHTML='';
    times.forEach(function(t,i){
      var tl=document.createElement('div'); tl.className='tl'; tl.textContent=t; grid.appendChild(tl);

      var a=document.createElement('div');
      a.className='c '+(busyA.has(i)?'busy':cartA.has(i)?'cart':'free');
      if(!busyA.has(i) && !cartA.has(i)){
        a.addEventListener('click', function(){ openSheet(i, a); });
      }
      grid.appendChild(a);

      var b=document.createElement('div');
      b.className='c l '+(busyB.has(i)?'busy':'free');
      grid.appendChild(b);
    });
  }

  var week=document.getElementById('week');
  var days=[['L',16],['M',17],['M',18],['J',19],['V',20],['S',21],['D',22]];
  var selDays=new Set([1,2]);
  days.forEach(function(d,i){
    var el=document.createElement('div');
    el.className='wd'+(selDays.has(i)?' sel':'');
    el.innerHTML=d[0]+'<b>'+d[1]+'</b>';
    week.appendChild(el);
  });

  var overlay=document.getElementById('overlay');
  var sheet=document.getElementById('sheet');
  var endSel=document.getElementById('endSel');
  var startVal=document.getElementById('startVal');
  var durLine=document.getElementById('durLine');
  var priceVal=document.getElementById('priceVal');
  var cartCount=document.getElementById('cartCount');
  var toast=document.getElementById('toast');
  var count=2;

  function nextBusy(from){
    for(var j=from+1; j<times.length; j++){ if(busyA.has(j)) return j; }
    return times.length;
  }

  function openSheet(i, cell){
    if(selCell) selCell.classList.remove('sel');
    selCell=cell; selIndex=i;
    cell.classList.add('sel');
    startVal.textContent=times[i];

    var limit=nextBusy(i);
    endSel.innerHTML='';
    for(var j=i+1; j<=limit; j++){
      var label = j<times.length ? times[j] : addHalf(times[times.length-1]);
      var o=document.createElement('option');
      o.value=j; o.textContent=label;
      endSel.appendChild(o);
    }
    updateMeta();
    overlay.classList.add('show');
    sheet.classList.add('show');
  }

  function addHalf(t){
    var p=t.split(':'); var h=+p[0], m=+p[1]+30;
    if(m>=60){h++; m-=60;}
    return h+':'+(m<10?'0':'')+m;
  }

  function updateMeta(){
    var endIdx=+endSel.value;
    var slots=endIdx-selIndex;
    var hrs=slots*0.5;
    var durTxt = hrs===Math.floor(hrs) ? hrs+'h' : Math.floor(hrs)+'h30';
    durLine.textContent='Durée '+durTxt+" · tarif selon l'item";
    var price=(slots*6).toFixed(2).replace('.',',');
    priceVal.textContent=price+' €';
  }

  endSel.addEventListener('change', updateMeta);

  function closeSheet(){
    overlay.classList.remove('show');
    sheet.classList.remove('show');
    if(selCell){ selCell.classList.remove('sel'); selCell=null; }
  }

  overlay.addEventListener('click', closeSheet);

  document.getElementById('addBtn').addEventListener('click', function(){
    var endIdx=+endSel.value;
    for(var j=selIndex; j<endIdx; j++){ cartA.add(j); }
    count++;
    cartCount.textContent=count;
    closeSheet();
    render();
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 1600);
  });

  render();
})();
</script>
</body>
</html>
