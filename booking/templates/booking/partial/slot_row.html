<!--
LOCALISATION : booking/templates/booking/partial/slot_row.html

Affiche une ligne de créneau dans la liste des créneaux.
/ Renders a single slot row in the slot list.

Variables attendues / Expected variables:
  ressource — objet Resource
  creneau   — BookableInterval

L'id "slot-<pk>-<Ymd-Hi>" est partagé avec booking_form.html : cliquer
sur ce <li> le remplace par le formulaire de réservation (outerHTML swap).
Après soumission du formulaire, le serveur renvoie ce même partial avec
les données mises à jour — le <li> reprend sa forme normale.
/ The id "slot-<pk>-<Ymd-Hi>" is shared with booking_form.html: clicking
this <li> replaces it with the booking form (outerHTML swap). After form
submission, the server returns this same partial with updated data —
the <li> returns to its normal state.
-->
{% load i18n %}

{% if creneau.remaining_capacity == 0 %}

    <li id="slot-{{ ressource.pk }}-{{ creneau.start|date:'Ymd-Hi' }}"
        class="d-flex align-items-center gap-2 mb-2 text-muted"
        data-testid="booking-slot-unavailable"
        aria-label="{% translate 'Créneau complet' %}">
        <i class="bi bi-x-circle text-danger" aria-hidden="true"></i>
        <span>{{ creneau.start|date:"D d/m H:i" }}</span>
        <span class="badge bg-danger ms-auto">
            {% translate "Complet" %}
        </span>
    </li>

{% else %}

    <!--
    Créneau disponible — hx-get charge le formulaire et remplace ce <li>
    entier via outerHTML. La même cible #slot-<pk>-<start> est utilisée
    par le formulaire pour se ré-échanger après soumission.
    / Available slot — hx-get loads the form and replaces this entire <li>
    via outerHTML. The same target #slot-<pk>-<start> is used by the form
    to swap itself back after submission.
    -->
    <li id="slot-{{ ressource.pk }}-{{ creneau.start|date:'Ymd-Hi' }}"
        class="d-flex align-items-center gap-2 mb-2"
        data-testid="booking-slot-available">
        <a href="/booking/{{ ressource.pk }}/booking_form/?start_datetime={{ creneau.start|date:'Y-m-d\TH:i:s' }}&slot_duration_minutes={{ creneau.duration_minutes }}"
           hx-get="/booking/{{ ressource.pk }}/booking_form/?start_datetime={{ creneau.start|date:'Y-m-d\TH:i:s' }}&slot_duration_minutes={{ creneau.duration_minutes }}"
           hx-target="#slot-{{ ressource.pk }}-{{ creneau.start|date:'Ymd-Hi' }}"
           hx-swap="outerHTML"
           class="text-decoration-none d-flex align-items-center gap-2 w-100 text-reset">
            <i class="bi bi-check-circle text-success" aria-hidden="true"></i>
            <span>{{ creneau.start|date:"D d/m H:i" }}</span>
            <span class="badge bg-success ms-auto">
                {{ creneau.remaining_capacity }}
                {% translate "place(s)" %}
            </span>
        </a>
    </li>

{% endif %}
