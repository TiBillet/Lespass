<!--
LOCALISATION : booking/templates/booking/partial/basket_confirmed.html

Affiché après la validation du panier (validate_basket).
Remplace le composant panier (data-testid="booking-basket").
/ Shown after basket validation (validate_basket).
Replaces the basket component (data-testid="booking-basket").

Variables attendues / Expected variables:
  nombre_de_reservations — int, nombre de réservations confirmées
-->
{% load i18n %}

<div data-testid="booking-basket" class="mt-4">

    <div class="alert alert-success" role="alert">
        <i class="bi bi-check-circle-fill me-2" aria-hidden="true"></i>
        {% blocktrans with n=nombre_de_reservations %}
            {{ n }} réservation(s) confirmée(s).
        {% endblocktrans %}
    </div>

    <a href="/booking/"
       class="btn btn-outline-secondary btn-sm">
        {% translate "Toutes les ressources" %}
    </a>

</div>
