<!--
LOCALISATION : booking/templates/booking/partial/slot_list.html

Variables attendues / Expected variables:
  ressource — objet Resource
  creneaux  — list[BookableInterval] (déjà filtrée/slicée par l'appelant
               si besoin)

Chaque ligne est rendue par slot_row.html. Cliquer sur un créneau
disponible remplace la ligne par le formulaire de réservation (outerHTML).
/ Each row is rendered by slot_row.html. Clicking an available slot
replaces the row with the booking form (outerHTML).
-->
{% load i18n %}

<ul class="list-unstyled" aria-label="{% translate 'Créneaux' %}">
    {% for creneau in creneaux %}
        {% include "booking/partial/slot_row.html" with ressource=ressource creneau=creneau %}
    {% endfor %}
</ul>
