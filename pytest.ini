[pytest]
DJANGO_SETTINGS_MODULE = TiBillet.settings
markers =
    integration: integration tests for API v2
    onboard: onboard wizard tests (use shared dev DB, no migrations)
    e2e: end-to-end Playwright browser tests (require running server via Traefik)
filterwarnings =
    ignore:Unverified HTTPS request is being made to host.*:urllib3.exceptions.InsecureRequestWarning
