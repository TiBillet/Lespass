          type: string
          format: uuid
        name:
          type: string
        value:
          type: string
          example: "120.00"
        currency:
          type: string
          example: EUR
        actionStatus:
          type: string
          example: approved
        dateCreated:
          type: string
          format: date-time
    BudgetItemCreate:
      type: object
      properties:
        description:
          type: string
        amount:
          type: string
          example: "120.00"
        actionStatus:
          type: string
          example: approved
    Participation:
      type: object
      description: schema.org/Action-like representation for participations
      properties:
        '@type':
          type: string
          example: Action
        identifier:
          type: string
          format: uuid
        description:
          type: string
        actionStatus:
          type: string
        object:
          type: object
          properties:
            '@type':
              type: string
              example: Project
            identifier:
              type: string
              format: uuid
            name:
              type: string
        agent:
          type: object
          properties:
            '@type':
              type: string
              example: Person
            name:
              type: string
            email:
              type: string
        amount:
          type: object
          properties:
            '@type':
              type: string
              example: MonetaryAmount
            value:
              type: string
            currency:
              type: string
        timeSpentMinutes:
          type: integer
        dateCreated:
          type: string
