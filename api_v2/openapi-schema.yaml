              example: Person
            email:
              type: string
              format: email
            givenName:
              type: string
            familyName:
              type: string
        membershipPlan:
          type: object
          properties:
            '@type':
              type: string
              example: Offer
            identifier:
              type: string
              format: uuid
              description: Price UUID
        validUntil:
          type: string
          format: date-time
        additionalProperty:
          type: array
          items:
            type: object
            properties:
              '@type':
                type: string
                example: PropertyValue
              name:
                type: string
                example: paymentMode
              value:
                oneOf:
                  - type: string
                  - type: object
                  - type: array
                    items:
                      type: string
    ProgramMembership:
      type: object
      description: schema.org/ProgramMembership output
      properties:
        '@context':
          type: string
          example: https://schema.org
        '@type':
          type: string
          example: ProgramMembership
        identifier:
          type: string
          format: uuid
        member:
          type: object
          properties:
            '@type':
              type: string
              example: Person
            email:
              type: string
              format: email
            givenName:
              type: string
            familyName:
              type: string
        membershipPlan:
          type: object
          properties:
            '@type':
              type: string
              example: Offer
            identifier:
              type: string
              format: uuid
            name:
              type: string
        validUntil:
          type: string
          format: date-time
    ProductFormFieldInput:
      type: object
      description: Dynamic field definition for product forms
      properties:
        label:
          type: string
          example: Nom
        fieldType:
          type: string
          example: shortText
        required:
          type: boolean
        options:
          type: array
          items:
            type: string
        order:
          type: integer
        helpText:
          type: string
    Product:
      type: object
      description: schema.org/Product representation used for sales lines
      properties:
        '@context':
          type: string
          example: https://schema.org
        '@type':
          type: string
          example: Product
        name:
          type: string
        description:
          type: string
          nullable: true
        image:
          type: string
          format: uri
          nullable: true
        category:
          type: string
          description: Human-readable product category
        sku:
          type: string
          description: Product UUID
        identifier:
          type: string
          description: Product UUID (alias)
        offers:
          $ref: '#/components/schemas/Offer'
        additionalProperty:
          type: array
          items:
            $ref: '#/components/schemas/PropertyValue'
    Offer:
      type: object
      properties:
        '@type':
          type: string
          example: Offer
        identifier:
          type: string
          format: uuid
          description: Price UUID when listing Product offers
        price:
          type: string
          description: Unit price including VAT, as string
          example: "10.00"
        priceCurrency:
          type: string
          example: EUR
    PropertyValue:
      type: object
      properties:
        '@type':
          type: string
          example: PropertyValue
        name:
          type: string
        value:
          type: string
    ItemList:
      type: object
      properties:
        '@context':
          type: string
          example: https://schema.org
        '@type':
          type: string
          example: ItemList
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        itemListElement:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    MoneyTransfer:
      type: object
      properties:
        '@context':
          type: string
          example: https://schema.org
        '@type':
          type: string
          example: MoneyTransfer
        identifier:
          type: string
          format: uuid
          description: Fedow transaction UUID
        amount:
          type: integer
          description: Credited token amount in raw unit
          example: 500
        asset:
          type: string
          format: uuid
          description: Refillable asset UUID (TNF/TIM/FID/BDG)
        recipient:
          type: object
          properties:
            '@type':
              type: string
              example: Person
            email:
              type: string
              format: email
    WebPage:
      type: object
      description: "schema.org/WebPage — page publique composée de blocs"
      properties:
        '@context':
          type: string
          example: https://schema.org
        '@type':
          type: string
          example: WebPage
        identifier:
          type: string
          format: uuid
        name:
          type: string
          description: Titre de la page
        url:
          type: string
          format: uri
          description: "URL publique de la page (/<slug>/)"
        description:
          type: string
          nullable: true
          description: meta_description (SEO)
        hasPart:
          type: array
          description: Blocs de contenu ordonnés par position
          items:
            $ref: '#/components/schemas/WebPageElement'
        additionalProperty:
          type: array
          description: >
            Méta-champs complémentaires portés en PropertyValue[].
            Clés : slug (string), position (int), publie (bool),
            est_accueil (bool), noindex (bool), meta_title (string).
          items:
            $ref: '#/components/schemas/PropertyValue'
    WebPageCreate:
      type: object
      description: Payload de création de page (avec blocs imbriqués optionnels)
      properties:
        '@context':
          type: string
          example: https://schema.org
        '@type':
          type: string
          example: WebPage
        name:
          type: string
        description:
          type: string
          nullable: true
        additionalProperty:
          type: array
          description: >
            Méta-champs : slug (string), publie (bool), est_accueil (bool),
            noindex (bool), meta_title (string), position (int).
          items:
            $ref: '#/components/schemas/PropertyValue'
        hasPart:
          type: array
          description: "Blocs à créer atomiquement avec la page (optionnel)"
          items:
            $ref: '#/components/schemas/WebPageElementCreate'
    WebPagePatch:
      type: object
      description: "Champs modifiables sur une page existante (méta uniquement, pas les blocs)"
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        additionalProperty:
          type: array
          description: >
            Méta-champs à modifier : slug, publie, est_accueil, noindex,
            meta_title, position.
          items:
            $ref: '#/components/schemas/PropertyValue'
    WebPageElement:
      type: object
      description: "schema.org/WebPageElement — un bloc de contenu"
      properties:
        '@type':
          type: string
          example: WebPageElement
        identifier:
          type: string
          format: uuid
        additionalType:
          type: string
          description: >
            Type de bloc (champ pivot du mapping). Valeurs possibles :
            HERO, PARAGRAPHE, IMAGE_TEXTE, CTA, TEMOIGNAGE, VIDEO_TEXTE,
            CARTE, IMAGE, CARTE_LEAFLET, INFOS, FAQ, EVENEMENTS, GALERIE, EMBED.
          example: HERO
        headline:
          type: string
          description: Titre du bloc
        alternativeHeadline:
          type: string
          description: Sous-titre du bloc
        text:
          type: string
          description: "Contenu HTML nettoyé par nh3 (whitelist de balises autorisées)"
        image:
          description: >
            URL de l'image principale (string), ou liste ImageObject[]
            pour les blocs GALERIE.
          oneOf:
            - type: string
              format: uri
            - type: array
              items:
                $ref: '#/components/schemas/ImageObject'
        position:
          type: integer
          description: Ordre du bloc dans la page (croissant)
        additionalProperty:
          type: array
          description: >
            Tous les champs supplémentaires du bloc sous forme PropertyValue[].
            Clés possibles : surtitre, badge, image_secondaire (URL),
            image_position, bouton_label, bouton_url,
            bouton2_label, bouton2_url, auteur_nom, auteur_role,
            auteur_photo (URL), points_gps (JSON), contenu (JSON),
            nombre_max (int), repliable (bool), embed_url.
            Le champ video n'est pas settable via l'API (admin uniquement) ;
            pour une vidéo, utiliser le bloc EMBED (embed_url).
            Format value : string | nombre | booléen | liste | objet JSON.
          items:
            $ref: '#/components/schemas/PropertyValue'
    WebPageElementCreate:
      type: object
      description: Payload pour créer ou modifier un bloc
      properties:
        additionalType:
          type: string
          description: "Type de bloc (requis à la création)"
          example: HERO
        headline:
          type: string
        alternativeHeadline:
          type: string
        text:
          type: string
          description: "HTML (sera nettoyé par nh3 côté serveur)"
        image:
          description: >
            URL http/https (téléchargée par le serveur, ≤ 10 Mo) ou liste
            ImageObject[] pour GALERIE. URLs internes/privées/loopback refusées
            (protection SSRF). Vidéos : multipart uniquement, pas par URL.
          oneOf:
            - type: string
              format: uri
            - type: array
              items:
                $ref: '#/components/schemas/ImageObject'
        position:
          type: integer
        additionalProperty:
          type: array
          description: >
            Champs complémentaires en PropertyValue[].
            Champs lien (bouton_url, bouton2_url, embed_url) :
            les schémas dangereux (javascript:, data:, vbscript:)
            sont neutralisés automatiquement (champ vidé).
          items:
            $ref: '#/components/schemas/PropertyValue'
    BlockType:
      type: object
      description: "Type de bloc disponible avec ses champs autorisés"
      properties:
        type:
          type: string
          description: Code du type de bloc
          example: HERO
        label:
          type: string
          description: Libellé lisible
          example: "Héro"
        fields:
          type: array
          description: Noms des champs autorisés pour ce type
          items:
            type: string
    ImageObject:
      type: object
      description: "schema.org/ImageObject — image dans un bloc GALERIE"
      properties:
        '@type':
          type: string
          example: ImageObject
        contentUrl:
          type: string
          format: uri
          description: "URL publique de l'image (téléchargée par le serveur)"
        caption:
          type: string
          description: "Légende de l'image"
