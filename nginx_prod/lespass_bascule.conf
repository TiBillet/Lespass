# =============================================================================
# CONF TEMPORAIRE DE BASCULE — relais vers le nouveau serveur.
# / TEMPORARY CUTOVER CONF — relay to the new server.
#
# LOCALISATION : nginx_prod/lespass_bascule.conf
#
# A QUOI CA SERT. Pendant une migration de serveur, le DNS met du temps a
# propager la nouvelle adresse IP. Les visiteurs continuent d'arriver sur
# l'ANCIEN serveur. Ce fichier remplace la conf normale sur l'ancien serveur :
# nginx n'envoie plus rien a Django en local, il relaie TOUT vers le nouveau
# serveur. Le visiteur ne voit aucune difference.
# / During a server migration, DNS takes time to propagate. Visitors still land
# on the OLD server. This conf makes its nginx relay EVERYTHING to the new one.
#
# POURQUOI UN RELAIS ET PAS UNE REDIRECTION. Le nom de domaine est le meme des
# deux cotes. Une redirection 301 vers ce meme nom bouclerait a l'infini (le
# DNS renvoie encore l'ancienne adresse). Vers un nom temporaire, l'adresse
# changerait dans le navigateur : les cookies de session seraient poses sur un
# autre domaine, et surtout django-tenants choisit le tenant D'APRES LE NOM DE
# DOMAINE — le visiteur atterrirait sur le mauvais lieu, ou sur aucun.
# / A 301 cannot work: same domain name on both sides (infinite loop), and a
# temporary name would break session cookies AND tenant resolution, which
# django-tenants derives from the Host header.
#
# COMMENT L'ACTIVER :
#   1. Remplacer NOUVELLE_IP ci-dessous par l'adresse du nouveau serveur.
#   2. Dans docker-compose.prod.yml, service lespass_nginx, monter CE fichier :
#        - ./nginx_prod/lespass_bascule.conf:/etc/nginx/conf.d/default.conf:ro
#      et commenter la ligne `links: - lespass_django:lespass_django`
#      (voir « CONTENEUR APPLICATIF ARRETE » plus bas).
#   3. Arreter le conteneur applicatif de l'ancien serveur, puis recreer nginx.
#
# COMMENT REVENIR EN ARRIERE : remettre la ligne de volume d'origine
# (lespass_prod.conf) et le `links`, puis redemarrer les deux conteneurs.
#
# CONTENEUR APPLICATIF ARRETE. Cette conf ne nomme jamais `lespass_django`,
# et c'est VOULU : nginx resout les noms de ses upstreams AU DEMARRAGE et
# refuse de demarrer si l'un d'eux est introuvable. L'ancien conteneur
# applicatif doit etre arrete — il n'orchestre pas que gunicorn, il fait aussi
# tourner celery beat (cron du matin, relances d'emails, clotures). Laisse
# vivant, il continuerait d'ecrire dans l'ANCIENNE base et d'envoyer de vrais
# emails aux vrais clients depuis un etat fige.
# / This conf never names `lespass_django` on purpose: nginx resolves upstream
# names at startup and refuses to boot if one is missing. The old app container
# MUST be stopped — it also runs celery beat, which would keep writing to the
# OLD database and sending real emails from a frozen state.
#
# NI /static NI /media EN LOCAL. La conf normale sert ces deux chemins depuis
# les dossiers de l'ancien serveur. Ici, ils partent au nouveau comme le reste :
# des la bascule, tout fichier depose par un utilisateur arrive sur le NOUVEAU
# serveur, et l'ancien renverrait des 404 sur les images.
# / No local /static or /media here: once switched, every user upload lands on
# the NEW server, so serving them locally would 404 on fresh images.
# =============================================================================


# Format d'acces identique a la conf normale, pour que les logs de la bascule
# restent lisibles par les memes outils. `$host` porte le tenant.
# / Same access format as the normal conf, so cutover logs stay parsable.
log_format tibillet
    '$remote_addr - $remote_user [$time_local] '
    '"$request_method $host$request_uri $server_protocol" '
    '$status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time urt=$upstream_response_time';


server {

    listen 80;
    server_name localhost;

    # VRAIE IP DU VISITEUR. Sans ces trois lignes, `$remote_addr` vaut l'IP de
    # Traefik pour tout le monde. On la reconstruit depuis `X-Forwarded-For`,
    # que Traefik renseigne. Elle est ensuite relayee au nouveau serveur par le
    # `proxy_set_header X-Forwarded-For` de chaque location : sans elle, le
    # nouveau serveur ne verrait que l'IP de l'ancien, pour tous les visiteurs.
    # / REAL VISITOR IP: rebuilt from `X-Forwarded-For`, then relayed onward.
    # Without it the new server would see the old server's IP for everyone.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    access_log /logs/nginxAccess.log tibillet;
    error_log /logs/nginxError.log;

    # Meme plafond que la conf normale : un depot d'image plus gros serait
    # refuse ICI, avant meme d'atteindre le nouveau serveur.
    # / Same limit as the normal conf: a bigger upload would be rejected HERE.
    client_max_body_size 12M;


    # -------------------------------------------------------------------------
    # WEBSOCKETS (caisse, imprimante, RFID) — declares AVANT `location /`.
    # Une regex l'emporte sur un prefixe en nginx, mais on garde l'ordre de la
    # conf normale pour que les deux fichiers se relisent pareil.
    # Sans les en-tetes `Upgrade`/`Connection`, la connexion est traitee comme
    # une requete HTTP ordinaire : la caisse decroche.
    # / WebSockets. Without the Upgrade/Connection headers the connection is
    # handled as a plain HTTP request and the POS drops.
    # -------------------------------------------------------------------------
    location ~ ^/(wss|ws)/ {
        proxy_pass https://NOUVELLE_IP;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Le nom de domaine demande par le visiteur. C'est lui qui designe le
        # tenant. / The visitor's domain name: it selects the tenant.
        proxy_set_header Host $host;

        # SNI. Le nouveau serveur termine le TLS avec Traefik, qui choisit le
        # certificat d'apres le nom annonce pendant la poignee de main. Sans
        # ces deux lignes, nginx annonce l'adresse IP : Traefik ne reconnait
        # aucun de ses domaines et sert son certificat par defaut — erreur TLS
        # chez tous les visiteurs. `proxy_ssl_name` sert AUSSI de nom verifie.
        # / SNI: without these, nginx announces the raw IP, Traefik serves its
        # default certificate and every visitor gets a TLS error.
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # Connexions longues : pas de coupure au bout de 60 s.
        # / Long-lived connections: no 60s cutoff.
        proxy_read_timeout 86400;
    }


    # -------------------------------------------------------------------------
    # TOUT LE RESTE — pages, API, admin, static, media.
    # / EVERYTHING ELSE — pages, API, admin, static, media.
    # -------------------------------------------------------------------------
    location / {
        proxy_pass https://NOUVELLE_IP;

        # Le nom de domaine demande par le visiteur = le tenant. C'est la ligne
        # la plus importante du fichier : sans elle, django-tenants ne resout
        # aucun lieu et toutes les pages tombent.
        # / The visitor's domain name IS the tenant selector. The single most
        # important line here: without it no tenant resolves at all.
        proxy_set_header Host $host;

        # SNI + verification du certificat du nouveau serveur (voir plus haut).
        # / SNI + certificate verification (see above).
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $server_name;

        # Valeur IMPOSEE, pas relayee : Django s'y fie pour savoir s'il est en
        # HTTPS (SECURE_PROXY_SSL_HEADER). Relayer laisserait un client du
        # reseau docker forger l'en-tete. En dur c'est correct : le visiteur
        # arrive toujours par l'entrypoint `websecure` de Traefik.
        # / Hardcoded, not relayed: relaying would let a container on the docker
        # network forge it. Safe because visitors always arrive via Traefik's
        # `websecure` entrypoint.
        proxy_set_header X-Forwarded-Proto https;

        # `off` : on ne recrit pas les en-tetes `Location` renvoyes par le
        # nouveau serveur. Ils portent deja le bon nom de domaine, puisque
        # celui-ci lui est transmis intact.
        # / `off`: Location headers already carry the right domain name.
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
    }

}

include mime.types;
types {
    application/javascript js mjs;
}
