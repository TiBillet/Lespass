# Format d'acces TiBillet. Trois ajouts par rapport au `combined` par defaut :
#
# 1. `$host` — INDISPENSABLE en multi-tenant. `$request` ne contient que le
#    chemin (`GET /blog/ HTTP/1.1`) : deux tenants differents produisent des
#    lignes identiques, et on ne sait pas de quel lieu vient la requete. On
#    journalise donc `$host$request_uri`, qui porte le tenant ET la query
#    string.
#    Le schema est volontairement absent : Traefik termine le TLS en amont,
#    nginx ne voit que du http en interne — `$scheme` afficherait donc `http`
#    pour une visite en https, ce qui serait faux.
#
# 2. `rt=$request_time` — duree TOTALE vue par nginx, de la reception de la
#    requete au dernier octet envoye. Inclut la lenteur du reseau client.
#
# 3. `urt=$upstream_response_time` — temps passe par Gunicorn seul. Vaut `-`
#    quand aucun upstream n'est sollicite (fichier statique, `return 444`).
#
# C'est l'ECART entre les deux qui localise une lenteur : `rt` eleve avec
# `urt` faible = reseau ou client ; les deux eleves = applicatif Django.
# /!\ Ce format remplace `combined` : un parser de logs existant (fail2ban,
# GoAccess, awstats) doit etre mis a jour, sinon il ne reconnait plus les
# lignes.
# / TiBillet access format. Three additions over the default `combined`:
# `$host` (essential in multi-tenant: `$request` only carries the path, so two
# tenants log identical lines), `rt` (total time seen by nginx) and `urt` (time
# spent in Gunicorn alone). The GAP between rt and urt tells network-vs-app.
# Scheme is omitted on purpose: Traefik terminates TLS upstream, so `$scheme`
# would read `http` for an https visit. BEWARE: replaces `combined`, so any
# existing log parser must be updated.
log_format tibillet
    '$remote_addr - $remote_user [$time_local] '
    '"$request_method $host$request_uri $server_protocol" '
    '$status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time urt=$upstream_response_time';

server {

    listen 80;
    server_name localhost;

    access_log /logs/nginxAccess.log tibillet;
    error_log /logs/nginxError.log;

    # En-tetes de securite. Ici et pas dans Django, parce qu'une redirection
    # de CanonicalDomainRedirectMiddleware court-circuite SecurityMiddleware
    # et sortirait sans eux ; nginx voit toutes les reponses.
    # On ne pose QUE ce que Django n'envoie pas deja (Referrer-Policy,
    # nosniff, X-Frame-Options, COOP) : `add_header` ajoute, il ne remplace
    # pas, donc redeclarer produirait un en-tete en double.
    # X-Frame-Options doit rester cote Django : deux vues le neutralisent
    # pour autoriser l'embed en iframe.
    # `always` : sans lui, les reponses d'erreur partent sans ces en-tetes.
    # /!\ `add_header` n'est herite que si le bloc enfant n'en declare aucun.
    # `location /static` en declare un, il ne recoit donc pas ces en-tetes.
    # `location /media` (depots utilisateurs) en herite : ne pas y ajouter
    # d'`add_header` sans recopier ces lignes.
    # / Set here, not in Django: canonical redirects bypass SecurityMiddleware.
    # Only headers Django does not already send (add_header appends, so
    # re-declaring duplicates). X-Frame-Options stays in Django (two views
    # clear it for iframe embeds). Beware: add_header is not inherited by a
    # block that declares its own.

    # HSTS en montee progressive : 1 jour, pas 1 an. L'en-tete est
    # irreversible cote navigateur — une erreur avec 1 an bloque les
    # visiteurs un an. Passer a 31536000 apres une semaine sans incident.
    # Pas de `preload` : desinscription en plusieurs mois.
    # / Ramp-up: 1 day. Irreversible client-side. Bump after a week.
    add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;

    # Liste blanche des API navigateur que le site a le droit de demander.
    # N'affiche AUCUNE demande a l'utilisateur : le navigateur ne l'invite
    # que lorsque le JS appelle l'API (scan QR, carte). Passer une valeur a
    # `()` bloquerait l'appel meme avec l'accord de l'utilisateur.
    # `camera` : scan QR (BaseBillet/templates/fonctionnel/qrcode_scan_pay/)
    # `geolocation` : cartes Leaflet — `payment` : garde-fou Stripe
    # Ajouter une API ici AVANT de l'utiliser, sinon blocage silencieux.
    # / Whitelist of APIs the site may request. Prompts NOTHING by itself:
    # the browser asks only when JS calls the API. Setting a value to `()`
    # blocks the call even with user consent.
    add_header Permissions-Policy "camera=(self), geolocation=(self), payment=(self), microphone=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Scans WordPress : coupes ici, jamais transmis a Django. Ces chemins
    # n'existent dans aucune version du projet (zero PHP dans la stack), donc
    # les laisser passer ne sert qu'a faire rendre une 404 de ~35 Ko a Gunicorn
    # pour chaque sonde d'un robot.
    # `444` ferme la connexion sans repondre un octet (specifique nginx) : le
    # scanner n'obtient meme pas un code de statut a exploiter, et la ligne
    # reste visible dans nginxAccess.log si on veut mesurer le volume.
    # /!\ COLLISION POSSIBLE : `^/wp-` mange aussi une Page de l'app pages dont
    # le slug commencerait par `wp-` (le slug est libre cote admin). Aucun
    # tenant n'en a au 2026-07-21 ; si le cas se presente, restreindre le motif
    # aux chemins WordPress reels (wp-admin|wp-login|wp-content|wp-includes|
    # wp-json|wp-config) plutot que d'elargir l'exception.
    # / WordPress scans: cut here, never forwarded to Django. These paths exist
    # in no version of the project (no PHP in the stack), so letting them
    # through only makes Gunicorn render a ~35 KB 404 per bot probe. `444`
    # closes the connection without a single byte (nginx-specific).
    # BEWARE: `^/wp-` also swallows a pages-app Page whose slug starts with
    # `wp-`. None exists as of 2026-07-21; narrow the pattern if one appears.
    location ~* ^/wp- {
        return 444;
    }

    # Sondes WordPress qui ne portent PAS le prefixe `wp-` : l'API XML-RPC et
    # le manifeste Windows Live Writer, les deux autres chemins que les
    # scanners tentent systematiquement apres `wp-json`.
    # / WordPress probes without the `wp-` prefix: XML-RPC and the Windows Live
    # Writer manifest, the two other paths scanners always try after wp-json.
    location ~* ^/(xmlrpc\.php|wlwmanifest\.xml)$ {
        return 444;
    }

    # Cache des statiques. Critere : l'URL change-t-elle quand le fichier
    # change ? Cache long si oui (libs tierces versionnees), revalidation
    # sinon (CSS/JS maison, non versionne). `no-cache` autorise le stockage
    # et impose la revalidation : on garde les 304.
    # /!\ `bootstrap-icons.min.css` et `swal.css` n'ont pas de version dans
    # leur nom : les renommer avec leur version lors d'une mise a jour,
    # sinon les visiteurs gardent l'ancienne jusqu'a un an.
    # / Long cache only for versioned third-party libs; revalidate our own
    # unversioned assets. Rename the two unversioned libs when updating.
    location /static {
        root /www;

        add_header Cache-Control "no-cache";

        location ~* /vendor/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Libs tierces posees hors `vendor/`, ciblees par nom de fichier.
        # / Third-party libs outside `vendor/`, matched by filename.
        location ~* /(bootstrap|htmx|django-htmx|leaflet|markercluster|plotly|easymde|select2|jquery|swal)[^/]*\.(css|js)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Assets des apps Python tierces (admin, DRF, Unfold...).
        # /!\ Leur URL, elle, ne change PAS lors d'une mise a jour du paquet :
        # apres un upgrade Django/Unfold, les visiteurs gardent les anciens
        # fichiers jusqu'a un an. Purger le cache navigateur ou passer a
        # ManifestStaticFilesStorage le jour ou ca pose probleme.
        # / Their URL does NOT change when the package is upgraded: visitors
        # keep stale assets for up to a year after a Django/Unfold update.
        location ~* ^/static/(admin|rest_framework|django_extensions|django_htmx|unfold|debug_toolbar)/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
    # Aucun fichier executable ne sort de /media, quoi qu'il arrive a s'y
    # trouver. Le dossier est PARTAGE par tous les tenants et servi
    # directement depuis le disque : un .html qui y atterrirait s'executerait
    # sur l'origine de n'importe quel tenant (XSS cross-tenant, poste par le
    # staff d'un autre lieu).
    # `nosniff` NE SUFFIT PAS ici : il empeche de deviner un type, pas de
    # servir un .html declare text/html. D'ou ce 404 sec.
    # Les SVG sont inclus : ils peuvent porter du script, et le projet ne les
    # accepte pas comme images (StdImageField/Pillow ne sait pas les
    # redimensionner). Verifie au 2026-07-20 : /media ne contient que des
    # jpg/png/webp/mp4, cette regle ne casse donc aucun fichier existant.
    # / Nothing executable ever leaves /media. The folder is SHARED across
    # tenants and served straight from disk, so a stray .html would run on any
    # tenant's origin. `nosniff` is NOT enough: it prevents type sniffing, not
    # serving a genuine text/html. SVG included (can carry script, and the
    # project does not accept them as images).
    location ~* ^/media/.*\.(html?|xhtml|shtml|js|mjs|svg|svgz|xml|php\d?|phtml|pht|py|sh)$ {
        return 404;
    }

    # /media ne passe pas par Django : aucun en-tete de SecurityMiddleware ne
    # s'y applique, alors que ce sont des fichiers deposes par des
    # utilisateurs. On les repose donc ici.
    # / `/media` bypasses Django, so no SecurityMiddleware header applies to
    # these user uploads. We set them here.
    location /media {
        root /www;
        # Les deux `add_header` ci-dessous coupent l'heritage : HSTS et
        # Permissions-Policy du niveau `server` sont donc RECOPIES ici, comme
        # l'avertissement plus haut le demande. Toute ligne ajoutee au niveau
        # `server` doit l'etre ici aussi.
        # / These add_header break inheritance, so the server-level ones are
        # copied back. Any new server-level header must be copied here too.
        add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), geolocation=(self), payment=(self), microphone=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
    }

    # WebSockets (ws/laboutik, ws/printer, ws/rfid, ws/chat) → Daphne (ASGI).
    # Daphne écoute sur le port 7999 dans le conteneur lespass_django,
    # orchestré par supervisord (voir supervisor/conf.d/daphne.conf).
    # / WebSockets → Daphne (ASGI) on port 7999 inside lespass_django,
    # orchestrated by supervisord (see supervisor/conf.d/daphne.conf).
    location ~ ^/(wss|ws)/ {
        proxy_pass http://lespass_django:7999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # Connexions WebSocket longues : pas de timeout à 60s
        # / Long-lived WebSocket connections: no 60s timeout
        proxy_read_timeout 86400;
    }

    location / {
        # everything is passed to Gunicorn
        proxy_pass http://lespass_django:8002;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        client_max_body_size 12M;
        # nico tests
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $server_name;

        # Valeur IMPOSEE, pas relayee : Django s'y fie pour savoir s'il est en
        # HTTPS (SECURE_PROXY_SSL_HEADER). Relayer laisserait un client du
        # reseau docker forger l'en-tete et tromper Django. En dur c'est
        # correct : Traefik n'expose que l'entrypoint `websecure`.
        # / Hardcoded, not relayed: relaying would let a client on the docker
        # network forge it. Safe because Traefik only exposes `websecure`.
        proxy_set_header X-Forwarded-Proto https;
    }

}
include mime.types;
types {
    # here are additional types
    application/javascript js mjs;
}
